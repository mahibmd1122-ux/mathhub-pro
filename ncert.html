        const grid = document.getElementById('directory-grid');
        
        for (const [className, subjects] of Object.entries(ncertDatabase)) {
            let classFolder = `<details class="folder"><summary>${className}</summary>`;
            
            for (const [subjectName, chapters] of Object.entries(subjects)) {
                classFolder += `<details class="sub-folder"><summary>${subjectName}</summary>`;
                
                chapters.forEach(chapter => {
                    classFolder += `<a class="file-link" onclick="openPDF('pdfs/${chapter.file}', '${className} ${subjectName} - ${chapter.title}')">${chapter.title}</a>`;
                });
                
                classFolder += `</details>`; 
            }
            classFolder += `</details>`; 
            grid.innerHTML += classFolder;
        }

        // ==========================================
        // PDF VIEWER LOGIC
        // ==========================================
        function openPDF(pdfPath, title) {
            const viewer = document.getElementById('pdfViewerUI');
            viewer.style.display = 'flex';
            
            document.getElementById('pdfTitle').innerText = '> VIEWING: ' + title;
            document.getElementById('pdfDownloadLink').href = pdfPath;
            
            const fullUrl = 'https://mathhub.pro/' + pdfPath;
            document.getElementById('pdfFrame').src = 'https://docs.google.com/gview?embedded=true&url=' + encodeURIComponent(fullUrl);

            viewer.scrollIntoView({ behavior: 'smooth' });
        }

        function closePDF() {
            document.getElementById('pdfViewerUI').style.display = 'none';
            document.getElementById('pdfFrame').src = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
