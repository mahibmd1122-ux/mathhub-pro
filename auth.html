<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-adsense-account" content="ca-pub-9069263337314949">

<title>Sign In & Register | MathHub Pro Account</title>
<meta name="description" content="Create your free MathHub Pro account. Save your AI Math Solver history, track your Pomodoro study sessions, and bookmark CBSE NCERT PDFs instantly.">
<link rel="canonical" href="https://www.mathhub.pro/auth.html">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* GLOBAL STYLES */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1d4ed8;--blue-dark:#1e3a8a;--blue-light:#dbeafe;--green:#059669;--red:#dc2626;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--white:#ffffff;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 6px rgba(0,0,0,.07);--shadow-md:0 10px 15px rgba(0,0,0,.08);--radius-lg:16px;}
body{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-800);line-height:1.7;}
h1,h2,h3{font-family:'Poppins',sans-serif;color:var(--gray-900)}
a{text-decoration:none;color:inherit}

/* NAVIGATION */
.site-nav{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:1000;box-shadow:var(--shadow-sm);}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:64px;}
.nav-logo{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.2rem;color:var(--blue-dark);display:flex;align-items:center;gap:0.5rem;}
.nav-logo span{color:var(--blue)}
.nav-links{display:flex;gap:.25rem}
.nav-links a{padding:.4rem .8rem;border-radius:6px;font-size:.875rem;font-weight:500;color:var(--gray-600);transition:.2s}
.nav-links a:hover{color:var(--blue);background:var(--blue-light)}

/* PAGE SPECIFIC */
.inner-hero{background:linear-gradient(135deg,var(--blue-dark) 0%,var(--blue) 100%);color:var(--white);padding:40px 1.5rem 80px;text-align:center;}
.inner-hero h1{font-size:2.2rem;margin-bottom:0.5rem;color:var(--white);}
.container{max-width:1280px;margin:0 auto;padding:0 1.5rem;}

/* AUTH UI */
.auth-container{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:3rem;margin:-40px auto 3rem;max-width:550px;position:relative;z-index:10;}
.auth-toggle{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:2rem;}
.toggle-btn{flex:1;background:none;border:none;padding:1rem;font-size:1.1rem;font-weight:700;color:var(--gray-500);cursor:pointer;transition:.2s;position:relative;}
.toggle-btn.active{color:var(--blue);}
.toggle-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;width:100%;height:3px;background:var(--blue);border-radius:3px 3px 0 0;}

.auth-form{display:none; animation:fadeIn 0.3s ease;}
.auth-form.active{display:block;}
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.form-group{margin-bottom:1.5rem;}
.form-group label{display:block;font-weight:600;margin-bottom:0.5rem;color:var(--gray-700);font-size:0.95rem;}
.form-group input{width:100%;padding:1rem;border:1.5px solid var(--gray-300);border-radius:8px;font-size:1rem;font-family:'Inter',sans-serif;transition:.2s;}
.form-group input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);}

/* REAL-TIME APP MONITOR FEEDBACK */
.monitor-msg { margin: 1rem 0; font-size: 0.95rem; font-weight: 700; text-align: center; min-height: 24px; }

.btn-submit{background:var(--blue);color:var(--white);border:none;padding:1.2rem;border-radius:8px;font-size:1.1rem;font-weight:700;cursor:pointer;width:100%;transition:.2s;}
.btn-submit:hover{background:var(--blue-dark);}

.auth-footer{text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--gray-600);}
.auth-footer a{color:var(--blue);font-weight:600;}

.social-login{margin-top:2rem;text-align:center;}
.social-login p{font-size:0.9rem;color:var(--gray-500);margin-bottom:1rem;position:relative;}
.social-login p::before, .social-login p::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:var(--gray-200);}
.social-login p::before{left:0;}
.social-login p::after{right:0;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:0.75rem;width:100%;padding:1rem;background:var(--white);border:1.5px solid var(--gray-300);border-radius:8px;font-size:1rem;font-weight:600;color:var(--gray-700);cursor:pointer;transition:.2s;}
.btn-google:hover{background:var(--gray-50);border-color:var(--gray-400);}
.btn-google img{width:20px;height:20px;}

/* FOOTER */
footer{background:var(--gray-900);color:var(--gray-300);padding:3rem 1.5rem 1.5rem}
.footer-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:2.5rem;max-width:1280px;margin:0 auto 2.5rem;}
.footer-bottom{border-top:1px solid var(--gray-700);padding-top:1.5rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;max-width:1280px;margin:0 auto;}
.footer-bottom a{font-size:0.8rem;margin-left:1rem;color:var(--gray-400);}

@media(max-width:768px){.nav-links{display:none;} .auth-container{padding:2rem;}}
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span>MathHub</span>Pro</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="solver.html">AI Solver</a>
      <a href="ncert.html">NCERT Hub</a>
      <a href="contact.html">Contact Us</a>
    </div>
  </div>
</nav>

<section class="inner-hero">
  <h1>Welcome to MathHub Pro</h1>
  <p>Your personalized digital mathematics companion.</p>
</section>

<div class="container">
  
  <div class="auth-container">
    <div class="auth-toggle">
      <button class="toggle-btn active" onclick="switchTab('login')" id="tabLogin">Sign In</button>
      <button class="toggle-btn" onclick="switchTab('register')" id="tabRegister">Create Account</button>
    </div>

    <div id="authStatusMsg" class="monitor-msg"></div>

    <form id="formLogin" class="auth-form active">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="student@example.com" required>
      </div>
      <div class="form-group">
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Sign In to Dashboard</button>
      
      <div class="social-login">
        <p>Or continue with</p>
        <button type="button" id="googleAuthBtn" class="btn-google">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo">
          Sign in with Google
        </button>
      </div>
    </form>

    <form id="formRegister" class="auth-form">
      <div class="form-group">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" placeholder="student@example.com" required>
      </div>
      <div class="form-group">
        <label for="regPass">Create Password</label>
        <input type="password" id="regPass" placeholder="Minimum 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn-submit">Create Free Account</button>
      
      <div class="auth-footer">
        By creating an account, you agree to our <br> <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>.
      </div>
    </form>
  </div>
</div>

<script type="module">
  // Using the exact 12.14.0 SDK links you provided
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    signInWithEmailAndPassword, 
    signInWithPopup, 
    GoogleAuthProvider 
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

  // Your exact Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCPm8-ZNZQcMTAql6m8VVlB3WHgdHzdGv8",
    authDomain: "mathhub-pro.firebaseapp.com",
    projectId: "mathhub-pro",
    storageBucket: "mathhub-pro.firebasestorage.app",
    messagingSenderId: "861286840133",
    appId: "1:861286840133:web:06d346ca175827b6c9302c",
    measurementId: "G-375HJSRW1F"
  };

  // Initialize App Modules
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const statusMsg = document.getElementById('authStatusMsg');

  function showStatus(text, isError = false) {
    statusMsg.innerText = text;
    statusMsg.style.color = isError ? "var(--red)" : "var(--green)";
  }

  // Handle Account Registrations
  document.getElementById('formRegister').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('regEmail').value;
    const pass = document.getElementById('regPass').value;
    showStatus("Deploying encryption credentials...", false);

    createUserWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        showStatus(">> ACCOUNT_DEPLOYED. Redirecting...", false);
        setTimeout(() => window.location.href = "index.html", 1200);
      })
      .catch((error) => {
        const cleanErr = error.code.replace('auth/', '').replace(/-/g, '_').toUpperCase();
        showStatus("!! ERROR: " + cleanErr, true);
      });
  });

  // Handle Standard Dashboard Log-ins
  document.getElementById('formLogin').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    showStatus("Verifying access token...", false);

    signInWithEmailAndPassword(auth, email, pass)
      .then((userCredential) => {
        showStatus(">> ACCESS_GRANTED. Redirecting...", false);
        setTimeout(() => window.location.href = "index.html", 1200);
      })
      .catch((error) => {
        const cleanErr = error.code.replace('auth/', '').replace(/-/g, '_').toUpperCase();
        showStatus("!! ACCESS_DENIED: " + cleanErr, true);
      });
  });

  // Handle Google Popup Authentication
  document.getElementById('googleAuthBtn').addEventListener('click', () => {
    showStatus("Opening secure Google gateway...", false);
    signInWithPopup(auth, googleProvider)
      .then((result) => {
        showStatus(">> GOOGLE_AUTH_SUCCESS. Welcome!", false);
        setTimeout(() => window.location.href = "index.html", 1200);
      })
      .catch((error) => {
        showStatus("!! OAUTH_CANCELLED: " + error.message.substring(0, 30) + "...", true);
      });
  });
</script>

<script>
  // UI Tab Shifting System
  function switchTab(tab) {
    document.getElementById('authStatusMsg').innerText = ''; // Clear logs
    document.getElementById('tabLogin').classList.remove('active');
    document.getElementById('tabRegister').classList.remove('active');
    document.getElementById('formLogin').classList.remove('active');
    document.getElementById('formRegister').classList.remove('active');

    if (tab === 'login') {
      document.getElementById('tabLogin').classList.add('active');
      document.getElementById('formLogin').classList.add('active');
    } else {
      document.getElementById('tabRegister').classList.add('active');
      document.getElementById('formRegister').classList.add('active');
    }
  }
</script>

</body>
</html>
