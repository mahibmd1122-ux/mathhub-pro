<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Solver Terminal | MathHub Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap"></noscript>

    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-void: #020202;
            --border: rgba(0, 242, 255, 0.15);
        }

        body {
            background: var(--dark-void);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--neon-cyan);
            padding: 15px 0;
            width: 100%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .terminal-container {
            width: 90%;
            max-width: 850px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--neon-purple);
            border-left: 6px solid var(--neon-cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.05);
        }

        h2 { 
            font-family: 'Orbitron'; 
            color: var(--neon-cyan); 
            margin: 0 0 20px 0; 
            letter-spacing: 2px; 
        }

        #response-terminal {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #ccc;
        }

        .input-group { 
            display: flex; 
            gap: 10px; 
        }

        input {
            flex: 1;
            padding: 15px;
            background: rgba(0,242,255,0.03);
            border: 1px solid var(--neon-cyan);
            color: #fff;
            font-family: 'Orbitron';
            outline: none;
            font-size: 1rem;
        }

        .btn {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .btn:hover { 
            box-shadow: 0 0 15px var(--neon-cyan); 
        }
    </style>
</head>
<body>

<nav>
    <div style="width: 90%; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-family: 'Orbitron'; color: var(--neon-cyan); font-size: 1.2rem;">MATHHUB_PRO // AI_SOLVER</div>
        <a href="index.html" style="color: #fff; text-decoration: none; font-family: 'Orbitron'; font-size: 0.8rem; border: 1px solid #fff; padding: 5px 15px;">RETURN TO DASHBOARD</a>
    </div>
</nav>

<div class="terminal-container">
    <h2>> AI_MATH_SOLVER_v5.4</h2>
    
    <div id="response-terminal">
        > SYSTEM_INITIALIZING...<br>
        > Please wait while authentication protocols are verified.
    </div>

    <div id="auth-section" style="text-align: center; display: none;">
        <button class="btn" onclick="authenticateUser()">AUTHENTICATE CONNECTION</button>
    </div>

    <div id="input-section" class="input-group" style="display: none;">
        <input type="text" id="ai-query" placeholder="Enter mathematical query (e.g., 25 + 25)...">
        <button class="btn" onclick="executeSolver()">SOLVE</button>
    </div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
    const output = document.getElementById('response-terminal');
    const authSection = document.getElementById('auth-section');
    const inputSection = document.getElementById('input-section');
    const inputField = document.getElementById('ai-query');

    // Keyboard support for mobile/iPad
    inputField.addEventListener("keypress", (e) => { 
        if (e.key === "Enter") executeSolver(); 
    });

    // Automated System Check
    (async function initializeSystem() {
        try {
            const isSignedIn = await puter.auth.isSignedIn();
            if (isSignedIn) {
                authSection.style.display = 'none';
                inputSection.style.display = 'flex';
                output.innerHTML = `> SESSION_ACTIVE.<br>> Authentication verified. Awaiting input...<br><a href="#" onclick="forceLogout()" style="color: #ff4d4d; font-size: 0.75rem; text-decoration: none; border: 1px solid #ff4d4d; padding: 2px 5px; margin-top: 10px; display: inline-block;">RESET CONNECTION</a>`;
            } else {
                authSection.style.display = 'block';
                inputSection.style.display = 'none';
                output.innerHTML = `> AUTHENTICATION_REQUIRED.<br>> Please authenticate to access the cloud infrastructure.`;
            }
        } catch (error) {
            output.innerHTML = `> ERROR: Connection to authentication server failed.`;
        }
    })();

    async function authenticateUser() {
        try {
            output.innerHTML = `> Finalizing authentication...`;
            await puter.auth.signIn();
            window.location.reload(); 
        } catch (error) {
            output.innerHTML = `> ERROR: Authentication protocol aborted.`;
        }
    }

    async function forceLogout() {
        output.innerHTML = `> Terminating session and clearing cache...`;
        await puter.auth.signOut();
        window.location.reload();
    }

    async function executeSolver() {
        const query = inputField.value.trim();
        if (!query) return;

        output.innerHTML = `> Processing neural query: ${query}...`;
        inputField.value = "";
        
        try {
            // Updated API call for maximum stability
            const response = await puter.ai.chat(`Solve this math problem clearly: ${query}`);
            
            // TYPE-SAFE PROTECTION: Forces response to be a string
            let answerText = "";
            if (typeof response === 'string') {
                answerText = response;
            } else if (response && typeof response === 'object') {
                answerText = response.message || response.text || JSON.stringify(response);
            } else {
                answerText = "The system returned an empty response. Please try a different query.";
            }
            
            // Professional Formatting
            const formattedResponse = String(answerText).replace(/\n/g, '<br>');
            output.innerHTML = `<span style="color: var(--neon-purple)">> ANALYSIS_COMPLETE:</span><br><br>${formattedResponse}`;
            output.scrollTop = output.scrollHeight;
            
        } catch (error) {
            console.error("API Error:", error);
            output.innerHTML = `<span style="color: #ff4d4d">> SYSTEM_ERROR: The cloud solver failed to respond.</span><br><br>
            <button class="btn" style="padding: 10px; font-size: 0.8rem;" onclick="forceLogout()">RE-ESTABLISH CONNECTION</button>`;
        }
    }
</script>


</body>
</html>
