        > SYSTEM_INITIALIZING...<br>
        > Verifying computational nodes.
    </div>

    <div id="auth-section" style="text-align: center; display: none;">
        <button class="btn" onclick="authenticateUser()">AUTHENTICATE CONNECTION</button>

<script src="https://js.puter.com/v2/"></script>
<script>
    const output = document.getElementById('response-terminal');
    const authSection = document.getElementById('auth-section');
    const inputSection = document.getElementById('input-section');
    const inputField = document.getElementById('ai-query');

    inputField.addEventListener("keypress", (e) => { if (e.key === "Enter") executeSolver(); });

    (async function initializeSystem() {
        try {
            const isSignedIn = await puter.auth.isSignedIn();
            if (isSignedIn) {
                authSection.style.display = 'none';
                inputSection.style.display = 'flex';
                output.innerHTML = `> SESSION_ACTIVE.<br>> Ready for mathematical deployment.`;
            } else {
                authSection.style.display = 'block';
                inputSection.style.display = 'none';
                output.innerHTML = `> AUTHENTICATION_REQUIRED.<br>> Establish a secure cloud link to proceed.`;
            }
        } catch (error) {
            output.innerHTML = `> ERROR: Connection failed.`;
        }
    })();

    async function authenticateUser() {
        try {
            output.innerHTML = `> Redirecting to secure portal...`;
            await puter.auth.signIn();
            window.location.reload(); 
        } catch (error) {
            output.innerHTML = `> ERROR: Protocol aborted.`;
        }
    }

    async function executeSolver() {
        const query = inputField.value.trim();
        if (!query) return;

        output.innerHTML = `> Analyzing: ${query}...`;
        inputField.value = "";
        
        try {
            const systemInstructions = "You are a professional NCERT math expert. Analyze the physical constraints of the problem first. Provide step-by-step reasoning for: ";
            const response = await puter.ai.chat(systemInstructions + query);
            
            let answerText = typeof response === 'string' ? response : (response.message?.content || response.text || JSON.stringify(response));
            
            const formattedResponse = String(answerText).replace(/\n/g, '<br>');
            output.innerHTML = `<span style="color: var(--neon-purple)">> ANALYSIS_COMPLETE:</span><br><br>${formattedResponse}`;
            output.scrollTop = output.scrollHeight;
            
        } catch (error) {
            output.innerHTML = `<span style="color: #ff4d4d">> SYSTEM_ERROR: The cloud failed to respond.</span>`;
        }
    }
</script>
